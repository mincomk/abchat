services:
  nginx:
    image: nginx:stable-alpine
    container_name: abchat-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: always

  postgres:
    image: postgres:17-alpine
    container_name: abchat-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-abchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-abchat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Internal only, no ports exposed

  valkey:
    image: valkey/valkey:8-alpine
    container_name: abchat-valkey
    restart: always
    volumes:
      - valkey_data:/data
    # Internal only, no ports exposed

  backend:
    image: ghcr.io/mincomk/abchat/backend:main
    container_name: abchat-backend
    restart: always
    depends_on:
      - postgres
      - valkey
    env_file: .env
    environment:
      HTTP_LISTEN: "0.0.0.0:8080"
      REDIS_URL: "redis://valkey:6379"
      POSTGRES_URL: "postgres://${POSTGRES_USER:-abchat}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-abchat}"

  bot:
    image: ghcr.io/mincomk/abchat/bot:main
    container_name: abchat-bot
    restart: always
    depends_on:
      - valkey
    env_file: .env
    environment:
      REDIS_URL: "redis://valkey:6379"
  
  frontend:
    image: ghcr.io/mincomk/abchat/frontend:main
    container_name: abchat-frontend
    restart: always
    environment:
      VITE_WS_BACKEND_URL: ${VITE_WS_BACKEND_URL:-ws://localhost/api}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost/api}

volumes:
  postgres_data:
  valkey_data:
